name: Publish to npm

# Publishes @gerbergpt/medusa-fulfillment-sfexpress to npm using
# Trusted Publishing (GitHub Actions OIDC) — no NPM_TOKEN / secret required.
#
# One-time setup on npmjs.com (package → Settings → Trusted Publisher):
#   - Publisher:  GitHub Actions
#   - Repository: tonylabs/medusa-fulfillment-sfexpress
#   - Workflow filename: publish.yml
#   - Environment: (leave blank)
#
# Runs automatically only when a GitHub Release is published. A release always
# carries a version tag; the tag must match package.json's version (e.g. tag
# "v1.2.0" for version "1.2.0"), enforced below. So: bump the version, then
# create a release on the matching tag.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Verify release tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "v$VERSION" ] && [ "$TAG" != "$VERSION" ]; then
            echo "::error::Release tag '$TAG' does not match package.json version '$VERSION'. Tag the release 'v$VERSION'."
            exit 1
          fi
          echo "Publishing $VERSION (tag $TAG)"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Update npm (Trusted Publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build plugin
        run: yarn build

      - name: Publish to npm
        run: npm publish
